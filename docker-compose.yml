name: icog-psql-container
services:
  db:
    container_name: pgvector_container
    image: ankane/pgvector
    restart: always
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: 2214
      POSTGRES_DB: icog_dev_db
    ports:
      - "5432:5432"
    volumes:
      - ./database-init/init.sql:/docker-entrypoint-initdb.d/init.sql