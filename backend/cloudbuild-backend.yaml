substitutions:
  _SERVICE_NAME: icognition-api
  _REGION: us-central1
  _VPC_CONNECTOR: run-sql-connector
  _CLOUDSQL_INSTANCE: stg-icognition:us-central1:sm-stg-icongition-psql

steps:
  # Build the backend container image from Dockerfile (build context is current directory)
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/${PROJECT_ID}/icognition-backend:${SHORT_SHA}
      - -f
      - Dockerfile
      - .

  # Push the image to Artifact Registry / Container Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/${PROJECT_ID}/icognition-backend:${SHORT_SHA}

  # Deploy the image to Cloud Run
  - name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy ${_SERVICE_NAME} \
          --image gcr.io/${PROJECT_ID}/icognition-backend:${SHORT_SHA} \
          --region ${_REGION} \
          --platform managed \
          --vpc-connector ${_VPC_CONNECTOR} \
          --vpc-egress private-ranges-only \
          --add-cloudsql-instances ${_CLOUDSQL_INSTANCE} \
          --memory 2Gi \
          --cpu 2 \
          --timeout 300 \
          --max-instances 20 \
          --min-instances 0 \
          --concurrency 80 \
          --set-secrets DATABASE_URL=DB_CONNECTION_URL:latest,FIREBASE_SERVICE_ACCOUNT_JSON=FIREBASE_SERVICE_ACCOUNT_JSON:latest,GOOGLE_API_KEY=GOOGLE_API_KEY:latest,SECRET_KEY=SECRET_KEY:latest,GEMINI_FLASH_MODEL=GEMINI_FLASH_MODEL:latest,GEMINI_FLASH_LITE=GEMINI_FLASH_LITE:latest,GEMINI_EMBEDDING_MODEL=GEMINI_EMBEDDING_MODEL:latest \
          --allow-unauthenticated

images:
  - gcr.io/${PROJECT_ID}/icognition-backend:${SHORT_SHA}

