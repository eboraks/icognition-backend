steps:
- id: "Build Docker Image"
  name: 'gcr.io/cloud-builders/docker:latest'
  dir: '.'
  args: ['build', 
          '-t', 'us-central1-docker.pkg.dev/${PROJECT_ID}/icognition-api-artifact-registry/icognition-api-img',
          '.']

- id: "Push Docker Image To Artifact Registry"
  name: 'gcr.io/cloud-builders/docker:latest'
  args: ['push', '--all-tags', 'us-central1-docker.pkg.dev/${PROJECT_ID}/icognition-api-artifact-registry/icognition-api-img']

- id: "Deploy Cloud Run Service"
  name: 'gcr.io/cloud-builders/gcloud:latest'
  args: [
    'run', 'deploy', 'icognition-api-scv', 
    '--service-account' ,'sa-icognition-svc@${PROJECT_ID}.iam.gserviceaccount.com',
    '--allow-unauthenticated',
    '--memory', '2Gi',
    '--cpu', '2',
    '--platform', 'managed',
    '--image', 'us-central1-docker.pkg.dev/${PROJECT_ID}/icognition-api-artifact-registry/icognition-api-img',
    '--port', '8080',
    '--timeout', '30m',
    '--min-instances', '0',
    '--max-instances', '2',
    '--ingress', 'all',
    '--network', 'default',
    '--subnet', 'default',
    '--region', 'us-central1',
    '--set-env-vars', 'INSTANCE_CONNECTION_NAME=stg-icognition:us-central1:psql-icog-dev',
    '--set-env-vars', 'GCP_AI_KEY=gemini-ai-api-key:latest',
    '--set-env-vars', 'GEMINI_FLASH_MODEL=models/gemini-1.5-flash-001',
    '--set-env-vars', 'GEMINI_PRO_MODEL=models/gemini-1.5-pro-001',
    '--set-env-vars', 'GEMINI_EMBEDDING_MODEL=models/text-embedding-004',
    '--set-env-vars', 'ENTITY_SIMILARITY_FRESHOLD=0.7',
    '--set-env-vars', 'CLUSTERS_SIMILARITY_THRESHOLD=0.7',
    '--set-env-vars', 'CLUSTERS_MIN_SIZE=3',
    '--set-secrets', 'DATABASE_URL=icog-db-stg-secret:latest',
    '--set-secrets', 'TOGETHER_TOKEN=together-token-secret:latest',
    '--set-secrets', 'DB_NAME=central-db-icog-name:latest',
    '--set-secrets', 'DB_USER=central-db-icog-user:latest',
    '--set-secrets', 'DB_PASSWORD=central-db-icog-password:latest',
    '--add-cloudsql-instances', 'stg-icognition:us-central1:psql-icog-dev',
    ]
timeout: 1200s
options:
  logging: CLOUD_LOGGING_ONLY
  dynamic_substitutions: true
  